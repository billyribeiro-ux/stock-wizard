services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: wizard-timescale
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wizard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wizard}
      POSTGRES_DB: ${POSTGRES_DB:-stockwizard}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wizard} -d ${POSTGRES_DB:-stockwizard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wizard-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  timescale_data:
  redis_data:
